# ========================
# APPLICATION
# ========================
spring.application.name=InvoKit
server.port=7050

# ========================
# ORACLE DATABASE 11g
# ========================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# ========================
# JPA / HIBERNATE
# ========================
spring.jpa.database-platform=org.hibernate.dialect.Oracle10gDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ========================
# HIKARI CONNECTION POOL
# ========================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ========================
# JWT CONFIGURATION
# ========================
# Must be at least 512 bits = 64 characters minimum
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000
app.jwt.header=Authorization
app.jwt.prefix=Bearer

# ========================
# EMAIL CONFIGURATION
# ========================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ========================
# FILE UPLOAD
# ========================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads

# ========================
# INVOKIT BUSINESS CONFIG
# ========================
app.invoice.max-free-clients=5
app.invoice.max-free-invoices-per-month=20
app.invoice.default-currency=USD
app.invoice.pdf-storage-path=invoices/pdfs

# ========================
# LOGGING
# ========================
logging.level.root=INFO
logging.level.com.invoicetracker=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE